name: bornobit_rms
description: "BornoBit Restaurant — staff console (Flutter desktop)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.2
  fl_chart: ^0.69.2
  esc_pos_utils_plus: ^2.0.4
  open_filex: ^4.5.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

# Brand launcher icons. Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/brand/app-icon-1024.png"
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "assets/brand/app-icon-bg-1024.png"
  adaptive_icon_foreground: "assets/brand/app-icon-fg-1024.png"
  ios: true
  background_color_ios: "#EA580C"
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "assets/brand/app-icon-1024.png"
    icon_size: 256
