<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="BornoBit" fill="currentColor">
  <!-- Single-color mark. Inherits text color via currentColor (defaults to brand orange). -->
  <g fill="none" stroke="currentColor" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M34 25 V71"/>
    <path d="M34 25 H49 C63 25 63 46 49 46 H34"/>
    <path d="M34 47 H54 C69 47 69 71 54 71 H34"/>
  </g>
  <!-- "bit" spark, faded so the B stays dominant in one color -->
  <rect x="70" y="15" width="8.5" height="8.5" rx="2.4" fill="currentColor" opacity="0.5"/>
</svg>
